<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imluri</title>
  <meta name="description" content="imluri, developer of AI tools, Chrome extensions, Android utilities, and web applications. Creator of Chessist, APK Toolkit, and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EWNZVS3TXM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-EWNZVS3TXM');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.0/dist/iconify-icon.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164/examples/jsm/"
      }
    }
  </script>
  <!-- GitHub Pages SPA: restore path from ?p= redirect set by 404.html -->
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search).get('p');
      if (p) {
        // Replace the current history entry with the real path so the
        // router sees the correct pathname and the URL bar looks right.
        window.history.replaceState(null, '', decodeURIComponent(p));
      }
    })();
  </script>
</head>
<body>
  <!-- Background Layers -->
  <div class="bg-layer bg-radial"></div>
  <div class="bg-layer bg-noise"></div>
  <div class="bg-layer bg-grid"></div>
  <div class="bg-layer">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>
  <canvas id="scene-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></canvas>

  <a href="#app" class="skip-link">Skip to content</a>

  <!-- Navigation -->
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo" data-route>imluri</a>
      <ul class="nav-links">
        <li><a href="/" data-route>Home</a></li>
        <li><a href="/projects" data-route>Projects</a></li>
        <li><a href="/iyai" data-route>IYAI</a></li>
      </ul>
      <div class="nav-end">
        <a href="https://github.com/imluri" target="_blank" rel="noopener" class="nav-cta">
          <iconify-icon icon="mdi:github" width="14" height="14"></iconify-icon>
          GitHub
        </a>
        <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">
          <iconify-icon class="menu-open-icon" icon="mdi:menu" width="22" height="22"></iconify-icon>
          <iconify-icon class="menu-close-icon" icon="mdi:close" width="22" height="22"></iconify-icon>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="/" data-route>Home</a>
    <a href="/projects" data-route>Projects</a>
    <a href="/iyai" data-route>IYAI</a>
  </div>

  <!-- Page content swapped here by router -->
  <main id="app"></main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p class="footer-text">© 2026 imluri. All rights reserved.</p>
      <div class="social-links">
        <a href="https://github.com/imluri" target="_blank" rel="noopener">
          <iconify-icon icon="mdi:github" width="18" height="18"></iconify-icon>
        </a>
      </div>
    </div>
    <div class="container" style="margin-top:8px;">
      <p class="footer-text" style="font-size:0.72rem;">3D model: <a href="https://sketchfab.com/3d-models/just-a-girl-b2359160a4f54e76b5ae427a55d9594d" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">"Just a girl"</a> by <a href="https://sketchfab.com/Kensyouen" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">腱鞘炎の人</a> (CC-BY-4.0)</p>
    </div>
  </footer>

  <script src="/js/projects.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/router.js"></script>
  <script type="module" src="/js/scene3d.js" onerror="console.warn('3D scene failed to load')"></script>
</body>
</html>
